// SCORING
// ─────────────────────────────────────────────────────────────────────────────

function scoreCondition(condition, selected) {
  const sel = new Set(selected);
  if (sel.size === 0) return 0;

  // Hard exclusion
  const excluded = condition.excluding.filter((s) => sel.has(s));
  if (excluded.length > 0) return -1;

  // Required match
  const requiredMatches = condition.required.filter((s) => sel.has(s));
  if (condition.required.length > 0 && requiredMatches.length === 0) return 0;

  const reqScore = requiredMatches.length / Math.max(condition.required.length, 1);
  const supMatches = condition.supporting.filter((s) => sel.has(s));
  const supScore = supMatches.length / Math.max(condition.supporting.length + condition.required.length, 1);

  return Math.round((reqScore * 70 + supScore * 30) * 100) / 100;
}

function ScoreBar({ score }) {
  const pct = Math.max(0, Math.min(score, 100));
  const color = pct >= 70 ? "#0e7c6a" : pct >= 40 ? "#d97706" : "#2563eb";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
      <div style={{ flex: 1, height: "5px", background: "#e5e7eb", borderRadius: "10px", overflow: "hidden" }}>
        <div style={{ width: `${pct}%`, height: "100%", background: color, borderRadius: "10px", transition: "width 0.4s ease" }} />
      </div>
      <span style={{ fontSize: "12px", fontWeight: 700, color, minWidth: "34px" }}>{Math.round(pct)}%</span>
    </div>
  );
}

          <div style={{ background: "#fff", borderRadius: "14px", boxShadow: "0 2px 12px rgba(0,0,0,0.08)", overflow: "hidden" }}>
            <div style={{ padding: "16px 20px 12px", borderBottom: "1px solid #f1f5f9" }}>
              <h2 style={{ margin: 0, fontSize: "15px", fontWeight: 700, color: "#02343f" }}>Selecione os sintomas</h2>
              <p style={{ margin: "4px 0 0", fontSize: "12px", color: "#6b7280" }}>Marque todos os presentes no paciente</p>
            </div>
            <div style={{ maxHeight: "72vh", overflowY: "auto" }}>
              {SYMPTOM_CATEGORIES.map((cat) => (
                <div key={cat.id} style={{ borderBottom: "1px solid #f8fafc" }}>
                  <button
                    onClick={() => toggleCat(cat.id)}
                    style={{ width: "100%", display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 20px", background: "none", border: "none", cursor: "pointer", textAlign: "left" }}
                  >
                    <span style={{ display: "flex", alignItems: "center", gap: "8px", fontWeight: 600, color: "#374151", fontSize: "13px" }}>
                      <span>{cat.icon}</span>{cat.label}
                    </span>
                    <span style={{ color: "#9ca3af", fontSize: "12px" }}>{openCats.has(cat.id) ? "▲" : "▼"}</span>
                  </button>
                  {openCats.has(cat.id) && (
                    <div style={{ padding: "0 12px 10px" }}>
                      {cat.symptoms.map((s) => {
                        const isOn = selected.has(s.id);
                        return (
                          <label
                            key={s.id}
                            style={{ display: "flex", alignItems: "center", gap: "10px", padding: "7px 10px", borderRadius: "8px", cursor: "pointer", background: isOn ? "#f0fdf9" : "transparent", marginBottom: "2px", transition: "background 0.15s" }}
                          >
                            <div
                              onClick={() => toggleSymptom(s.id)}
                              style={{ width: "18px", height: "18px", borderRadius: "5px", border: isOn ? "2px solid #0e7c6a" : "2px solid #d1d5db", background: isOn ? "#0e7c6a" : "#fff", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, transition: "all 0.15s", cursor: "pointer" }}
                            >
                              {isOn && <span style={{ color: "#fff", fontSize: "11px", fontWeight: 700 }}>✓</span>}
                            </div>
                            <span onClick={() => toggleSymptom(s.id)} style={{ fontSize: "13px", color: isOn ? "#065f46" : "#374151", fontWeight: isOn ? 600 : 400, lineHeight: 1.4 }}>{s.label}</span>
                          </label>
                        );
                      })}
                    </div>
                  )}
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* RIGHT: Results */}
        <div>
          {selected.size === 0 ? (
            <div style={{ background: "#fff", borderRadius: "14px", padding: "60px 40px", textAlign: "center", boxShadow: "0 2px 12px rgba(0,0,0,0.06)" }}>
              <div style={{ fontSize: "56px", marginBottom: "16px" }}>🩺</div>
              <h3 style={{ color: "#02343f", fontFamily: "Georgia, serif", fontSize: "20px", margin: "0 0 10px" }}>Selecione os sintomas do paciente</h3>
              <p style={{ color: "#6b7280", fontSize: "14px", maxWidth: "380px", margin: "0 auto", lineHeight: 1.7 }}>
                Marque os sintomas presentes no painel à esquerda. O sistema irá sugerir as possíveis doenças e os antimicrobianos indicados pelo guia do Ceará.
              </p>
              <div style={{ display: "flex", gap: "12px", justifyContent: "center", marginTop: "28px", flexWrap: "wrap" }}>
                {["Pele", "Respiratório", "Digestivo", "Urinário", "ISTs"].map((t) => (
                  <span key={t} style={{ background: "#f0fdf9", color: "#0e7c6a", border: "1px solid #a7f3d0", fontSize: "12px", padding: "5px 14px", borderRadius: "20px", fontWeight: 600 }}>{t}</span>
                ))}
              </div>
            </div>
          ) : scored.length === 0 ? (
            <div style={{ background: "#fff", borderRadius: "14px", padding: "50px 40px", textAlign: "center", boxShadow: "0 2px 12px rgba(0,0,0,0.06)" }}>
              <div style={{ fontSize: "48px", marginBottom: "14px" }}>🔍</div>
              <h3 style={{ color: "#374151", fontSize: "18px", margin: "0 0 8px" }}>Nenhuma condição encontrada</h3>
              <p style={{ color: "#6b7280", fontSize: "14px" }}>A combinação de sintomas selecionada não corresponde às condições do guia. Revise os sintomas ou consulte diretamente o guia completo.</p>
            </div>
          ) : (
            <>
              <div style={{ marginBottom: "14px", display: "flex", alignItems: "center", gap: "10px" }}>
                <h2 style={{ margin: 0, fontSize: "16px", fontWeight: 700, color: "#02343f" }}>Possíveis diagnósticos</h2>
                <span style={{ background: "#0e7c6a", color: "#fff", fontSize: "11px", fontWeight: 700, padding: "2px 10px", borderRadius: "20px" }}>{scored.length} encontrado{scored.length > 1 ? "s" : ""}</span>
              </div>
              {scored.map((c, i) => (
                <div
                  key={c.id}
                  onClick={() => setModal(c)}
                  style={{ background: "#fff", borderRadius: "12px", padding: "18px 20px", marginBottom: "12px", cursor: "pointer", boxShadow: "0 2px 10px rgba(0,0,0,0.06)", border: "1px solid transparent", transition: "all 0.2s", position: "relative" }}
                  onMouseEnter={(e) => { e.currentTarget.style.borderColor = "#0e7c6a40"; e.currentTarget.style.boxShadow = "0 4px 20px rgba(14,124,106,0.12)"; }}
                  onMouseLeave={(e) => { e.currentTarget.style.borderColor = "transparent"; e.currentTarget.style.boxShadow = "0 2px 10px rgba(0,0,0,0.06)"; }}
                >
                  {i === 0 && (
                    <div style={{ position: "absolute", top: "12px", right: "14px", background: "#fef3c7", color: "#92400e", fontSize: "10px", fontWeight: 700, padding: "2px 8px", borderRadius: "20px", letterSpacing: "0.5px" }}>
                      ★ MAIOR CORRESPONDÊNCIA
                    </div>
                  )}
                  <div style={{ display: "flex", alignItems: "center", gap: "12px", marginBottom: "10px" }}>
                    <span style={{ fontSize: "26px" }}>{c.emoji}</span>
                    <div style={{ flex: 1 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: "8px", flexWrap: "wrap" }}>
                        <span style={{ fontWeight: 700, color: "#02343f", fontSize: "15px", fontFamily: "Georgia, serif" }}>{c.name}</span>
                        <span style={{ fontSize: "10px", color: "#9ca3af", fontWeight: 600 }}>CAP. {c.chapter}</span>
                      </div>
                      <ScoreBar score={c.score} />
                    </div>
                  </div>
                  <p style={{ margin: "0 0 12px", color: "#4b5563", fontSize: "13px", lineHeight: 1.6 }}>{c.description}</p>
                  <div style={{ display: "flex", gap: "6px", flexWrap: "wrap" }}>
                    {c.treatments.slice(0, 3).map((t, j) => (
                      <span key={j} style={{ fontSize: "11px", fontWeight: 600, padding: "3px 10px", borderRadius: "20px", ...getTreatmentBadgeStyle(t.type) }}>
                        {t.name.split(" ")[0]}
                      </span>
                    ))}
                    {c.treatments.length > 3 && (
                      <span style={{ fontSize: "11px", fontWeight: 600, padding: "3px 10px", borderRadius: "20px", background: "#f1f5f9", color: "#6b7280" }}>
                        +{c.treatments.length - 3} opções
                      </span>
                    )}
                  </div>
                  <div style={{ marginTop: "12px", borderTop: "1px solid #f3f4f6", paddingTop: "10px", fontSize: "12px", color: "#0e7c6a", fontWeight: 600, display: "flex", alignItems: "center", gap: "4px" }}>
                    Ver posologia completa e alertas clínicos →
                  </div>
                </div>
              ))}
              <div style={{ marginTop: "16px", padding: "12px 16px", background: "#fff7ed", border: "1px solid #fde68a", borderRadius: "10px", fontSize: "12px", color: "#92400e", lineHeight: 1.6 }}>
                <strong>⚠️ Aviso:</strong> Este guia é auxiliar à decisão clínica. Os resultados são sugestivos e devem ser interpretados pelo profissional de saúde, considerando a anamnese completa, o exame físico e os fatores individuais de cada paciente.
              </div>
            </>
          )}
        </div>
      </div>

      <Modal condition={modal} onClose={() => setModal(null)} />
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));

</script>
</body>
</html>
