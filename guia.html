// ─────────────────────────────────────────────────────────────────────────────
// SCORING
// ─────────────────────────────────────────────────────────────────────────────

function scoreCondition(condition, selected) {
  const sel = new Set(selected);
  if (sel.size === 0) return 0;

  // Exclusion check — any excluding symptom present = discard
  const excluded = condition.excluding.filter((s) => sel.has(s));
  if (excluded.length > 0) return -1;

  // requiredAny: at least ONE of the listed symptoms must be present (OR logic)
  if (condition.requiredAny && condition.requiredAny.length > 0) {
    const anyMatch = condition.requiredAny.some((s) => sel.has(s));
    if (!anyMatch) return 0;
  }

  // required: ALL must be present (AND logic)
  const requiredMatches = condition.required.filter((s) => sel.has(s));
  if (condition.required.length > 0 && requiredMatches.length === 0) return 0;

  const reqScore = requiredMatches.length / Math.max(condition.required.length, 1);

  // requiredAny contribution to score
  const reqAnyMatches = condition.requiredAny
    ? condition.requiredAny.filter((s) => sel.has(s)).length
    : 0;
  const reqAnyTotal = condition.requiredAny ? condition.requiredAny.length : 0;
  const reqAnyScore = reqAnyTotal > 0 ? reqAnyMatches / reqAnyTotal : 1;

  const supMatches = condition.supporting.filter((s) => sel.has(s));
  const totalDenom = Math.max(condition.supporting.length + condition.required.length + reqAnyTotal, 1);
  const supScore = supMatches.length / totalDenom;

  // Weight: required(AND) 50% + requiredAny(OR) 30% + supporting 20%
  // If no AND-required, shift weight: requiredAny 60% + supporting 40%
  let score;
  if (condition.required.length > 0) {
    score = reqScore * 50 + reqAnyScore * 20 + supScore * 30;
  } else {
    score = reqAnyScore * 65 + supScore * 35;
  }
  return Math.round(score * 100) / 100;
}

// ─────────────────────────────────────────────────────────────────────────────
// SCORE BAR
// ─────────────────────────────────────────────────────────────────────────────

function ScoreBar({ score }) {
  const pct = Math.max(0, Math.min(score, 100));
  const color = pct >= 70 ? "#0e7c6a" : pct >= 40 ? "#d97706" : "#2563eb";
  return (
    <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
      <div style={{ flex: 1, height: "5px", background: "#e5e7eb", borderRadius: "10px", overflow: "hidden" }}>
        <div style={{ width: `${pct}%`, height: "100%", background: color, borderRadius: "10px", transition: "width 0.4s ease" }} />
      </div>
      <span style={{ fontSize: "12px", fontWeight: 700, color, minWidth: "34px" }}>{Math.round(pct)}%</span>
    </div>
  );
}

      </div>

      <Modal condition={modal} onClose={() => setModal(null)} />
      {refModal && <ReferenceModal onClose={() => setRefModal(false)} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
</body>
</html>
