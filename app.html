body {
  font-family: 'DM Sans', 'Segoe UI', sans-serif;
  background: #f0f2f5;
  min-height: 100vh;
  color: #1a1a2e;
}

/* ── TOP BAR ── */
.topbar {
  background: #0f3460;
  color: white;
  padding: 10px 32px;
  display: flex;
  align-items: center;
  gap: 14px;
  position: sticky;
  top: 0;
  z-index: 200;
  box-shadow: 0 2px 12px rgba(0,0,0,.25);
  height: 95px;
}
.topbar-info { flex: 1; }
.topbar-icon {
  width: 36px; height: 36px;
  background: rgba(255,255,255,.15);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 21.6px;
  flex-shrink: 0;
}
.topbar h1 { font-size: 18px; font-weight: 700; letter-spacing: -.01em; }
.topbar p  { font-size: 13.2px; opacity: .55; margin-top: 1px; }
.topbar-gen-btn {
  background: #e94560;
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 8px 20px;
  font-size: 15.6px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 7px;
  white-space: nowrap;
  transition: background .15s, transform .1s;
  flex-shrink: 0;
  letter-spacing: .02em;
}
.topbar-gen-btn:hover  { background: #c73050; transform: translateY(-1px); }
.topbar-gen-btn:active { transform: translateY(0); }
.topbar-gen-btn .ico   { font-size: 18px; }

/* ── PAGE LAYOUT ── */
.page {
  max-width: 1400px;
  margin: 0 auto;
  padding: 18px 20px 40px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* Linha superior */
.top-row {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* Menus colapsáveis (Unidade e Assinatura) */
.collapsible-card {
  background: #fff;
  border-radius: 10px;
  box-shadow: 0 1px 3px rgba(0,0,0,.07), 0 2px 8px rgba(0,0,0,.05);
  border: 1px solid #e4e8f0;
  overflow: hidden;
}
.collapsible-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 13px 18px;
  cursor: pointer;
  user-select: none;
  background: #fff;
  transition: background .15s;
}
.collapsible-header:hover { background: #f5f7fb; }
.collapsible-header-left {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 14.4px;
  font-weight: 700;
  color: #0f3460;
  text-transform: uppercase;
  letter-spacing: .07em;
}
.collapsible-header-left .icon { font-size: 18px; }
.collapsible-chevron {
  font-size: 13px;
  color: #888;
  transition: transform .25s;
}
.collapsible-card.open .collapsible-chevron { transform: rotate(180deg); }
.collapsible-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height .3s ease;
  padding: 0 18px;
}
.collapsible-card.open .collapsible-body {
  max-height: 600px;
  padding: 0 18px 16px;
}

/* Card paciente: largura total */
.paciente-card {
  width: 100%;
}
.paciente-grid-1 {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr;
  gap: 8px;
  margin-bottom: 8px;
}
.paciente-grid-2 {
  display: grid;
  grid-template-columns: 1fr;
  gap: 8px;
}

/* ── CARD ── */
.card {
  background: #fff;
  border-radius: 10px;
  padding: 16px 18px 14px;
  box-shadow: 0 1px 3px rgba(0,0,0,.07), 0 2px 8px rgba(0,0,0,.05);
  border: 1px solid #e4e8f0;
}

.card-title {
  font-size: 14.4px;
  font-weight: 700;
  color: #0f3460;
  display: flex;
  align-items: center;
  gap: 7px;
  margin-bottom: 12px;
  padding-bottom: 10px;
  border-bottom: 1.5px solid #eef0f5;
  text-transform: uppercase;
  letter-spacing: .07em;
}
.card-title .icon { font-size: 18px; }

/* ── FORM GRIDS ── */
.gd1  { display: grid; grid-template-columns: 1fr; gap: 8px; }
.gd2  { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.gd3  { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.gd4  { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; }
.gd21 { display: grid; grid-template-columns: 2fr 1fr; gap: 8px; }
.gd12 { display: grid; grid-template-columns: 1fr 2fr; gap: 8px; }
.gd211{ display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 8px; }
.gd311{ display: grid; grid-template-columns: 3fr 1fr 1fr; gap: 8px; }
.gds2 { grid-column: span 2; }
.gds3 { grid-column: span 3; }
.gds4 { grid-column: span 4; }

/* aliases for drug template compatibility */
.g1  { display: grid; grid-template-columns: 1fr; gap: 8px; }
.g2  { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.g3  { display: grid; grid-template-columns: 2fr 1fr 1.5fr; gap: 8px; }
.span2 { grid-column: span 2; }

.field { display: flex; flex-direction: column; gap: 3px; }
.field label {
  font-size: 12px;
  font-weight: 700;
  color: #7a8099;
  text-transform: uppercase;
  letter-spacing: .07em;
}
.field input,
.field select,
.field textarea {
  padding: 7px 10px;
  border: 1.5px solid #dde1ec;
  border-radius: 6px;
  font-family: inherit;
  font-size: 15.6px;
  color: #1a1a2e;
  background: #fafbfd;
  outline: none;
  transition: border-color .15s, box-shadow .15s, background .15s;
}
.field input:focus,
.field select:focus,
.field textarea:focus {
  border-color: #0f3460;
  box-shadow: 0 0 0 3px rgba(15,52,96,.1);
  background: #fff;
}
.field textarea { resize: vertical; min-height: 54px; }

/* ── TYPE SELECTOR ── */
.type-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}
.type-btn {
  padding: 10px 8px;
  border: 1.5px solid #dde1ec;
  border-radius: 8px;
  background: #fff;
  font-family: inherit;
  cursor: pointer;
  transition: all .18s;
  text-align: center;
  line-height: 1.4;
}
.type-btn .t1 { font-size: 14.4px; font-weight: 700; color: #333; display: block; }
.type-btn .t2 { font-size: 12px; color: #999; display: block; margin-top: 2px; }
.type-btn.active { border-color: #0f3460; background: rgba(15,52,96,.05); }
.type-btn.active .t1 { color: #0f3460; }
.type-btn.active .t2 { color: #0f3460; opacity: .7; }
.type-btn:hover:not(.active) { border-color: #aaa; background: #fafafa; }

/* ── DRUG ITEMS ── */
.drug-item {
  background: #f7f9fc;
  border: 1.5px solid #dde5f5;
  border-radius: 8px;
  margin-bottom: 10px;
  overflow: hidden;
}
.drug-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 14px;
  border-bottom: 1px solid #dde5f5;
  cursor: pointer;
  user-select: none;
  transition: background .15s;
}
.drug-header:hover { background: rgba(221,229,245,.45); }
.drug-chevron {
  font-size: 12px;
  color: #888;
  transition: transform .25s;
  flex-shrink: 0;
  margin-left: 16px;
  padding: 4px 6px;
  border-radius: 4px;
}
.drug-item.open .drug-chevron { transform: rotate(180deg); }
.drug-header-sep {
  width: 1px;
  height: 22px;
  background: #d0d8ee;
  flex-shrink: 0;
  margin-left: 12px;
}
.drug-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height .35s ease;
}
.drug-item.open .drug-body {
  max-height: 2000px;
  padding: 12px 14px 10px;
}
.drug-title-preview {
  flex: 1;
  text-align: center;
  font-size: 13px;
  font-weight: 600;
  color: #3a4a6b;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  padding: 0 10px;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s;
}
.drug-item:not(.open) .drug-title-preview { opacity: 1; }
.drug-badge {
  font-size: 12px;
  font-weight: 700;
  color: #0f3460;
  background: rgba(15,52,96,.1);
  padding: 2px 9px;
  border-radius: 20px;
  text-transform: uppercase;
  letter-spacing: .05em;
}
.del-btn {
  background: none;
  border: none;
  color: #c0392b;
  font-size: 19.2px;
  cursor: pointer;
  padding: 2px 5px;
  border-radius: 4px;
  line-height: 1;
  transition: background .15s;
}
.del-btn:hover { background: rgba(192,57,43,.1); }
.clear-btn {
  background: none;
  border: 1.5px solid #f39c12;
  color: #f39c12;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  padding: 3px 9px;
  border-radius: 20px;
  line-height: 1.4;
  white-space: nowrap;
  transition: background .15s, color .15s;
  display: flex;
  align-items: center;
  gap: 4px;
}
.clear-btn:hover { background: #f39c12; color: #fff; }
.topbar-print-btn {
  background: #1e5fa8;
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 8px 20px;
  font-size: 15.6px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 7px;
  white-space: nowrap;
  transition: background .15s, transform .1s;
  flex-shrink: 0;
  letter-spacing: .02em;
}
.topbar-print-btn:hover  { background: #174d8a; transform: translateY(-1px); }
.topbar-print-btn:active { transform: translateY(0); }
.topbar-print-btn .ico   { font-size: 18px; }
.drug-type-btns {
  display: flex;
  gap: 5px;
  margin-left: auto;
  margin-right: 8px;
  align-items: center;
}
.drug-type-btn {
  font-size: 12px;
  font-weight: 700;
  padding: 3px 9px;
  border-radius: 20px;
  border: 1.5px solid #c2cfe0;
  background: #fff;
  color: #5a7da8;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.drug-type-btn.active-simples  { background: #0f3460; color: #fff; border-color: #0f3460; }
.drug-type-btn.active-antibiotico { background: #c0392b; color: #fff; border-color: #c0392b; }
.drug-print-label {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 12px;
  font-weight: 700;
  color: #555;
  cursor: pointer;
  margin-left: 4px;
  user-select: none;
}
.drug-print-label input[type="checkbox"] {
  width: 13px; height: 13px;
  cursor: pointer;
  accent-color: #0f3460;
}

/* drug row grids */
.drug-row { display: grid; gap: 8px; margin-bottom: 8px; }
.drug-row.r2   { grid-template-columns: 1fr 1fr; }
.drug-row.r21  { grid-template-columns: 2fr 1fr; }
.drug-row.r12  { grid-template-columns: 1fr 2fr; }
.drug-row.r3   { grid-template-columns: 1fr 1fr 1fr; }
.drug-row.r211 { grid-template-columns: 2fr 1fr 1fr; }
.drug-row.r1   { grid-template-columns: 1fr; }
/* desktop: drug rows go wider */
.drug-row.r4   { grid-template-columns: 1fr 1fr 1fr 1fr; }
.drug-row.r123 { grid-template-columns: 0.6fr 1fr 1fr; }
.drug-row.r321 { grid-template-columns: 0.6fr 1fr 1fr; }
.drug-row.r211c { grid-template-columns: 2fr 1fr 0.5fr; }

/* Radio group */
.radio-group {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 7px 0 2px;
}
.radio-group label {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 14.4px;
  font-weight: 500;
  color: #333;
  cursor: pointer;
  text-transform: none;
  letter-spacing: 0;
}
.radio-group input[type=radio] {
  width: 14px; height: 14px;
  accent-color: #0f3460;
  cursor: pointer;
  border: none; box-shadow: none; padding: 0; background: none;
}

/* Period tabs */
.period-tabs { display: flex; gap: 0; margin-bottom: 8px; }
.period-tab {
  padding: 5px 12px;
  border: 1.5px solid #ddd;
  background: #fff;
  font-family: inherit;
  font-size: 13.2px;
  font-weight: 700;
  color: #555;
  cursor: pointer;
  transition: all .15s;
  margin-right: -1px;
}
.period-tab:first-child { border-radius: 6px 0 0 6px; }
.period-tab:last-child  { border-radius: 0 6px 6px 0; margin-right: 0; }
.period-tab.active { background: #0f3460; border-color: #0f3460; color: #fff; z-index: 1; position: relative; }
.period-tab:hover:not(.active) { background: #eef2fa; border-color: #9ab; }

.interval-panel { display: none; }
.interval-panel.show { display: block; }
.interval-btns { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
.int-btn {
  padding: 4px 10px;
  border: 1.5px solid #ccc;
  border-radius: 5px;
  background: #fff;
  font-family: inherit;
  font-size: 14.4px;
  font-weight: 700;
  color: #444;
  cursor: pointer;
  transition: all .12s;
}
.int-btn.active { background: #0f3460; border-color: #0f3460; color: #fff; }
.int-btn:hover:not(.active) { border-color: #0f3460; color: #0f3460; }
.interval-custom { display: flex; align-items: center; gap: 5px; margin-left: 4px; }
.interval-custom input {
  width: 56px; padding: 5px 7px;
  border: 1.5px solid #ddd; border-radius: 5px;
  font-family: inherit; font-size: 14.4px; text-align: center;
  background: #fafafa; outline: none;
}
.interval-custom input:focus { border-color: #0f3460; background: #fff; }
.interval-custom span { font-size: 14.4px; color: #666; }

.freq-panel { display: none; }
.freq-panel.show { display: block; }
.turno-panel { display: none; }
.turno-panel.show { display: block; }
.turno-checkboxes { display: flex; gap: 10px; flex-wrap: wrap; padding: 3px 0; }
.turno-checkboxes label {
  display: flex; align-items: center; gap: 4px;
  font-size: 14.4px; color: #333; cursor: pointer;
  text-transform: none; letter-spacing: 0; font-weight: 500;
}
.turno-checkboxes input[type=checkbox] {
  width: 14px; height: 14px; accent-color: #0f3460; cursor: pointer;
  border: none; box-shadow: none; padding: 0; background: none;
}

.pos-hint { font-size: 12px; color: #aaa; margin-top: 2px; }
.drug-section-label {
  font-size: 10.8px; font-weight: 700; color: #9aa;
  text-transform: uppercase; letter-spacing: .08em;
  margin-bottom: 6px; margin-top: 2px;
}

.add-drug-btn {
  width: 100%; padding: 9px;
  border: 1.5px dashed #0f3460; border-radius: 7px;
  background: none; color: #0f3460;
  font-family: inherit; font-size: 14.4px; font-weight: 700;
  cursor: pointer; transition: background .15s; margin-top: 2px;
}
.add-drug-btn:hover { background: rgba(15,52,96,.05); }

/* ── PROTOCOL DROPDOWN ── */
.protocol-wrap { position: relative; margin-top: 6px; }
.protocol-btn {
  width: 100%; padding: 9px;
  border: 1.5px dashed #16a34a; border-radius: 7px;
  background: none; color: #16a34a;
  font-family: inherit; font-size: 14.4px; font-weight: 700;
  cursor: pointer; transition: background .15s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.protocol-btn:hover { background: rgba(22,163,74,.06); }
.protocol-btn .arrow { font-size: 10.8px; transition: transform .2s; }
.protocol-btn.open .arrow { transform: rotate(180deg); }

.protocol-dropdown {
  display: none;
  position: absolute;
  top: calc(100% + 5px);
  left: 0; right: 0;
  background: #fff;
  border: 1.5px solid #bbf0cf;
  border-radius: 9px;
  box-shadow: 0 8px 28px rgba(0,0,0,.13);
  z-index: 100;
  overflow: hidden;
}
.protocol-dropdown.open { display: block; }
.protocol-search { padding: 8px 10px; border-bottom: 1px solid #e8f5ed; }
.protocol-search input {
  width: 100%; padding: 7px 11px;
  border: 1.5px solid #ddd; border-radius: 6px;
  font-family: inherit; font-size: 14.4px; outline: none; background: #fafafa;
}
.protocol-search input:focus { border-color: #16a34a; background: #fff; }
.protocol-groups { max-height: 340px; overflow-y: auto; }
.protocol-group-title {
  padding: 6px 12px 4px; font-size: 10.8px; font-weight: 700; color: #16a34a;
  text-transform: uppercase; letter-spacing: .08em;
  background: #f3fbf6; border-bottom: 1px solid #e0f0e8;
}
.protocol-item {
  padding: 7px 12px; cursor: pointer; border-bottom: 1px solid #f0f8f3;
  transition: background .12s;
  display: grid; grid-template-columns: 1fr auto; gap: 5px; align-items: center;
}
.protocol-item:last-child { border-bottom: none; }
.protocol-item:hover { background: #eef8f2; }
.protocol-item-name { font-size: 14.4px; font-weight: 700; color: #111; }
.protocol-item-detail { font-size: 12px; color: #888; margin-top: 1px; }
.protocol-item-badge {
  font-size: 10.8px; font-weight: 700; color: #16a34a;
  background: rgba(22,163,74,.1); padding: 2px 7px; border-radius: 10px;
  white-space: nowrap; align-self: start;
}

/* ── DRUG NAME AUTOCOMPLETE ── */
.drug-ac-wrap { position: relative; }
.drug-ac {
  position: absolute;
  top: calc(100% + 3px);
  left: 0; right: 0;
  background: #fff;
  border: 1.5px solid #b3cff5;
  border-radius: 9px;
  box-shadow: 0 8px 28px rgba(0,0,0,.15);
  z-index: 500;
  overflow: hidden;
  max-height: 320px;
  overflow-y: auto;
}
.drug-ac-item {
  padding: 8px 12px;
  cursor: pointer;
  border-bottom: 1px solid #f0f4fc;
  display: grid;
  grid-template-columns: 1fr auto;
  grid-template-rows: auto auto;
  gap: 1px 6px;
  align-items: start;
  transition: background .1s;
}
.drug-ac-item:last-child { border-bottom: none; }
.drug-ac-item:hover, .drug-ac-item.active { background: #eef4ff; }
.drug-ac-name {
  font-size: 14px; font-weight: 700; color: #111;
  grid-column: 1; grid-row: 1;
}
.drug-ac-conc {
  font-size: 12px; font-weight: 500; color: #0f3460;
  margin-left: 5px;
}
.drug-ac-detail {
  font-size: 11.5px; color: #777;
  grid-column: 1; grid-row: 2;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.drug-ac-badge {
  font-size: 10px; font-weight: 700; color: #16a34a;
  background: rgba(22,163,74,.1); padding: 2px 7px;
  border-radius: 10px; white-space: nowrap;
  grid-column: 2; grid-row: 1 / 3; align-self: center;
}

/* ── GENERATE BUTTON (legacy, not used but kept) ── */
.gen-btn {
  width: 100%; padding: 13px 24px;
  background: #0f3460; color: #fff; border: none; border-radius: 9px;
  font-family: inherit; font-size: 18px; font-weight: 700;
  cursor: pointer; transition: background .18s, transform .1s;
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
.gen-btn:hover  { background: #0a2444; transform: translateY(-1px); }
.gen-btn:active { transform: translateY(0); }
.gen-btn .ico   { font-size: 24px; }

/* dur radio */
.dur-radios { display: flex; gap: 0; }
.dur-radio-btn {
  padding: 6px 11px; font-size: 13.2px; font-weight: 700;
  border: 1.5px solid #ddd; background: #fff; cursor: pointer;
  font-family: inherit; color: #555; transition: all .12s; margin-right: -1px;
}
.dur-radio-btn:first-child { border-radius: 6px 0 0 6px; }
.dur-radio-btn:last-child  { border-radius: 0 6px 6px 0; margin-right: 0; }
.dur-radio-btn.active { background: #0f3460; border-color: #0f3460; color: #fff; z-index:1; position: relative; }
.dur-radio-btn:hover:not(.active) { background: #eef2fa; border-color: #9ab; }

@media (max-width: 1100px) {
  .top-row { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 780px) {
  .top-row { grid-template-columns: 1fr; }
  .gd2, .gd3, .gd4, .gd21, .gd12, .gd211, .gd311, .g2, .g3 { grid-template-columns: 1fr; }
  .gds2, .gds3, .gds4, .span2 { grid-column: span 1; }
  .card { padding: 14px 12px; }
  .topbar { padding: 8px 16px; }
  .drug-row.r2, .drug-row.r3, .drug-row.r4,
  .drug-row.r21, .drug-row.r12, .drug-row.r211,
  .drug-row.r211c, .drug-row.r123, .drug-row.r321 { grid-template-columns: 1fr 1fr; }
  .drug-row.r211 .field:first-child { grid-column: span 2; }
  .drug-row.r4 { grid-template-columns: 1fr 1fr; }
  .drug-row.r211c .field:first-child { grid-column: span 2; }
}
  font-family: inherit;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  box-shadow: 0 4px 16px rgba(30,95,168,.35);
  transition: background .15s, transform .1s;
}
.gen-btn:hover  { background: #154e8d; transform: translateY(-1px); }
.gen-btn:active { transform: translateY(0); }
.gen-btn .ico   { font-size: 24px; }

@media (max-width: 600px) {
  .type-grid { grid-template-columns: 1fr; }
  .g2, .g3   { grid-template-columns: 1fr; }
  .span2      { grid-column: span 1; }
  .card       { padding: 16px 12px; }
  css
 /* Linha 5 mobile: 2 colunas */
  .drug-row[style*="grid-template-columns:1fr 3fr"] {
    grid-template-columns: 1fr 1fr !important;
  }
  .drug-row[style*="grid-template-columns:1fr 3fr"] .field:nth-child(1),
  .drug-row[style*="grid-template-columns:1fr 3fr"] .field:nth-child(2) {
    grid-column: span 2;
  }

  /* Topbar empilhado */
  .topbar {
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
    padding: 12px 14px;
  }
  .topbar-gen-btn {
    width: 100%;
    justify-content: center;
    font-size: 16.8px;
    padding: 10px 14px;
  }

  /* Linha 1: nome em linha cheia, concentração + via lado a lado */
  .drug-row.r211 { grid-template-columns: 1fr 1fr; }
  .drug-row.r211 .field:first-child { grid-column: span 2; }

  /* Linha 2 (4 campos): 2 colunas */
  .drug-row.r4 { grid-template-columns: 1fr 1fr; }

  /* Linha 3: periodicidade em linha cheia, duração + uso contínuo lado a lado */
  .drug-row.r211c { grid-template-columns: 1fr 1fr; }
  .drug-row.r211c .field:first-child { grid-column: span 2; }

  /* Linha 5: início + conclusão lado a lado, qtd total abaixo */
  .drug-row.r3 { grid-template-columns: 1fr 1fr; }
  .drug-row.r3 .field:last-child { grid-column: span 2; }

  /* Linha 4 e outros de 1 coluna */
  .drug-row.r1 { grid-template-columns: 1fr; }

  /* Botões menores */
  .period-tab { font-size: 14.4px; padding: 5px 8px; }
  .int-btn    { font-size: 14.4px; padding: 5px 8px; }
  .drug-header { flex-wrap: wrap; gap: 6px; }
  .paciente-grid-1 { grid-template-columns: 1fr; }
}
</style>

<script>
// ── GUARD DE SESSÃO ─────────────────────────────────────────────
(function(){
  var SESSION_KEY = "receituario_auth";
  var raw = sessionStorage.getItem(SESSION_KEY);
  if (!raw) { window.location.replace("index.html"); return; }
  try {
    var data = JSON.parse(raw);
    if (!data.exp || Date.now() >= data.exp) {
      sessionStorage.removeItem(SESSION_KEY);
      window.location.replace("index.html");
    }
  } catch(e) { window.location.replace("index.html"); }
})();
// ────────────────────────────────────────────────────────────────
const { jsPDF } = window.jspdf;

let drugs = [], drugCount = 0, currentType = 'simples';

function toggleCard(id) {
  const card = document.getElementById(id);
  card.classList.toggle('open');
}

function setType(btn, type) {
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentType = type;
}

function setDrugTipo(n, tipo) {
  const di = document.getElementById('di_' + n);
  if (!di) return;
  di.dataset.tipo = tipo;
  // atualizar visual dos botões
  document.getElementById(`d${n}_tipo_simples`).className =
    'drug-type-btn' + (tipo === 'simples' ? ' active-simples' : '');
  document.getElementById(`d${n}_tipo_antibiotico`).className =
    'drug-type-btn' + (tipo === 'antibiotico' ? ' active-antibiotico' : '');
}

function v(id) { const e = document.getElementById(id); return e ? e.value.trim() : ''; }

/* ── Drug management ── */

  drugCount++;

          <option value="Oral">Oral</option>
          <option value="Sublingual">Sublingual</option>

function setupDrugAutocomplete(n) {
  const input = document.getElementById(`d${n}_nome`);
  if (!input) return;

  // Cria o dropdown de autocomplete dentro do .drug-ac-wrap
  const ac = document.createElement('div');
  ac.className = 'drug-ac';
  ac.id = `d${n}_ac`;
  ac.style.display = 'none';
  input.parentNode.appendChild(ac);

  let _items = [];
  let selectedIdx = -1;

  function getMatches(q) {
    if (!q || q.length < 2) return [];
    const ql = q.toLowerCase();
    return PROTOCOLS.filter(p =>
      p.nome.toLowerCase().includes(ql) ||
      (p.uso && p.uso.toLowerCase().includes(ql))
    ).slice(0, 10);
  }

  function renderAc(items) {
    _items = items;
    selectedIdx = -1;
    if (!items.length) { ac.style.display = 'none'; return; }
    ac.innerHTML = items.map((p, i) => {
      const groupShort = p.group.replace(/^\d+\. /, '');
      return `<div class="drug-ac-item" data-idx="${i}">
        <div class="drug-ac-name">${p.nome} <span class="drug-ac-conc">${p.conc}</span></div>
        <div class="drug-ac-detail">${p.uso}</div>
        <span class="drug-ac-badge">${groupShort}</span>
      </div>`;
    }).join('');
    ac.style.display = 'block';
  }

  function highlight(idx) {
    const els = ac.querySelectorAll('.drug-ac-item');
    els.forEach((el, i) => el.classList.toggle('active', i === idx));
  }

  input.addEventListener('input', function() {
    renderAc(getMatches(this.value));
  });

  input.addEventListener('focus', function() {
    if (this.value.length >= 2) renderAc(getMatches(this.value));
  });

  input.addEventListener('keydown', function(e) {
    const els = ac.querySelectorAll('.drug-ac-item');
    if (!els.length || ac.style.display === 'none') return;
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      selectedIdx = Math.min(selectedIdx + 1, els.length - 1);
      highlight(selectedIdx);
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      selectedIdx = Math.max(selectedIdx - 1, 0);
      highlight(selectedIdx);
    } else if (e.key === 'Enter' && selectedIdx >= 0) {
      e.preventDefault();
      if (_items[selectedIdx]) applyProtocolToDrug(n, _items[selectedIdx]);
    } else if (e.key === 'Escape') {
      ac.style.display = 'none';
      selectedIdx = -1;
    }
  });

  input.addEventListener('blur', function() {
    // Delay para permitir o click no item do dropdown
    setTimeout(() => { ac.style.display = 'none'; selectedIdx = -1; }, 200);
  });

  ac.addEventListener('mousedown', function(e) {
    const item = e.target.closest('.drug-ac-item');
    if (!item) return;
    const idx = parseInt(item.dataset.idx);
    if (_items[idx]) applyProtocolToDrug(n, _items[idx]);
  });
}

function applyProtocolToDrug(n, p) {
  // Fecha autocomplete
  const ac = document.getElementById(`d${n}_ac`);
  if (ac) ac.style.display = 'none';

  const setVal = (id, val) => { const el = document.getElementById(id); if (el) el.value = val; };
  setVal(`d${n}_nome`, p.nome);
  setVal(`d${n}_conc`, p.conc);
  updateDrugPreview(n);

  // Via de administração
  const viaEl = document.getElementById(`d${n}_via`);
  if (viaEl) {
    const opt = Array.from(viaEl.options).find(o =>
      o.value === p.via || o.text.toLowerCase() === p.via.toLowerCase()
    );
    if (opt) viaEl.value = opt.value;
  }

  // Forma farmacêutica
  const formaEl = document.getElementById(`d${n}_forma`);
  if (formaEl) {
    const formaSimple = p.forma.split(/[,/]/)[0].trim();
    const opt = Array.from(formaEl.options).find(o =>
      o.value.toLowerCase() === formaSimple.toLowerCase() ||
      o.value.toLowerCase().includes(formaSimple.toLowerCase())
    );
    if (opt) formaEl.value = opt.value;
  }

  // Posologia e protocolo (mesmos campos do selectProtocol)
  setVal(`d${n}_pos`, p.uso);
  setVal(`d${n}_obs`, p.protocolo);

  // Foca no próximo campo relevante
  const concEl = document.getElementById(`d${n}_conc`);
  if (concEl) concEl.focus();
}

function clearDrug(n) {
  // inputs de texto / number / date
  ['_nome','_conc','_pos','_obs','_qtd','_qtddose','_durnum','_inicio','_intcustom','_freqcustom'].forEach(s => {
    const el = document.getElementById(`d${n}${s}`);
    if (el) el.value = '';
  });
  // selects
  ['_via','_forma','_unidade','_unid_forn'].forEach(s => {
    const el = document.getElementById(`d${n}${s}`);
    if (el) el.selectedIndex = 0;
  });
  // radio tipo de dose → Comum
  const rdComum = document.querySelector(`input[name="d${n}_tipodose"][value="Comum"]`);
  if (rdComum) rdComum.checked = true;
  // radio duração → Dia(s)
  const rdDia = document.querySelector(`input[name="d${n}_durun"][value="Dia(s)"]`);
  if (rdDia) rdDia.checked = true;
  // hidden fields
  ['_intervalo','_frequencia','_dur'].forEach(s => {
    const el = document.getElementById(`d${n}${s}`);
    if (el) el.value = '';
  });
  // botões de intervalo → resetar para 8h
  const intBtns = document.querySelectorAll(`#d${n}_panel_intervalo .int-btn`);
  intBtns.forEach(b => b.classList.remove('active'));
  const btn8h = [...intBtns].find(b => b.textContent.trim() === '8h');
  if (btn8h) { btn8h.classList.add('active'); document.getElementById(`d${n}_intervalo`).value = '8h'; }
  // botões de frequência → desmarcar
  document.querySelectorAll(`#d${n}_panel_frequencia .int-btn`).forEach(b => b.classList.remove('active'));
  // turnos → desmarcar
  ['manha','tarde','noite','madrugada'].forEach(t => {
    const el = document.getElementById(`d${n}_t_${t}`);
    if (el) el.checked = false;
  });
  // checkboxes
  const cont = document.getElementById(`d${n}_continuo`);
  if (cont) cont.checked = false;
  const imp = document.getElementById(`d${n}_imprimir`);
  if (imp) imp.checked = true;
  // tipo de prescrição → antibiotico
  setDrugTipo(n, 'antibiotico');
  // aba de periodicidade → Intervalo
  const tabIntervalo = document.querySelector(`#di_${n} .period-tab`);
  if (tabIntervalo) setPeriodTab(n, 'intervalo', tabIntervalo);
}

/* ── Plural helper para unidades ── */
function pluralize(unidade, qty) {
  const n = parseFloat(qty);
  if (!unidade) return unidade;
  if (n <= 1) {
    // singular: remove o sufixo de plural
    return unidade.replace(/\(s\)/gi, '').replace(/\(ões\)/gi, 'ão').replace(/\(es\)/gi, '').trim();
  } else {
    // plural: aplica o sufixo
    return unidade.replace(/\(s\)/gi, 's').replace(/\(ões\)/gi, 'ões').replace(/\(es\)/gi, 'es').trim();
  }
}

/* ── Plural helper para formas farmacêuticas ── */
function pluralizeForma(forma, qty) {
  const n = parseFloat(qty);
  if (!forma || n <= 1) return forma;
  const map = {
    'Comprimido':            'Comprimidos',
    'Comprimido revestido':  'Comprimidos revestidos',
    'Cápsula':               'Cápsulas',
    'Solução oral':          'Soluções orais',
    'Suspensão oral':        'Suspensões orais',
    'Xarope':                'Xaropes',
    'Ampola':                'Ampolas',
    'Frasco-ampola':         'Frascos-ampola',
    'Pomada':                'Pomadas',
    'Creme':                 'Cremes',
    'Gel':                   'Géis',
    'Colírio':               'Colírios',
    'Spray nasal':           'Sprays nasais',
    'Inalador':              'Inaladores',
    'Supositório':           'Supositórios',
    'Adesivo transdérmico':  'Adesivos transdérmicos',
  };
  return map[forma] || forma;
}

function getDrugs() {
  return drugs.filter(n => {
    const cb = document.getElementById(`d${n}_imprimir`);
    return !cb || cb.checked;
  }).map(n => {
    const nome    = v(`d${n}_nome`);
    const conc    = v(`d${n}_conc`);
    const via     = v(`d${n}_via`);
    const forma   = v(`d${n}_forma`);
    const tipodose = (document.querySelector(`input[name="d${n}_tipodose"]:checked`) || {}).value || '';
    const qtddose = v(`d${n}_qtddose`);
    const unidade = v(`d${n}_unidade`);
    // periodicidade
    const activeTab = document.querySelector(`#di_${n} .period-tab.active`);
    let periodo = '';
    if (activeTab) {
      const tab = activeTab.textContent.trim();
      if (tab === 'Intervalo') periodo = v(`d${n}_intervalo`) ? `A cada ${v(`d${n}_intervalo`)}` : '';
      else if (tab === 'Frequência') periodo = v(`d${n}_frequencia`);
      else if (tab === 'Turno') {
        const turnos = ['manha','tarde','noite','madrugada'].filter(t => {
          const el = document.getElementById(`d${n}_t_${t}`);
          return el && el.checked;
        }).map(t => t.charAt(0).toUpperCase() + t.slice(1));
        periodo = turnos.join(' + ');
      }
    }
    const pos     = v(`d${n}_pos`);
    const inicio  = v(`d${n}_inicio`);
    const dur     = v(`d${n}_dur`);
    const obs     = v(`d${n}_obs`);
    const qtdNum2   = v(`d${n}_qtd`);
    const unidForn  = v(`d${n}_unid_forn`);
    const qtd  = qtdNum2 && unidForn
                          ? `${qtdNum2} ${pluralize(unidForn, qtdNum2)}`
                          : qtdNum2 || '';
    const continuo = document.getElementById(`d${n}_continuo`)?.checked ? 'Uso contínuo' : '';

    // Build posologia string for PDF
    const partes = [];
    if (qtddose && unidade) partes.push(`${qtddose} ${pluralize(unidade, qtddose)}`);
    if (via) partes.push(via);
    if (tipodose && tipodose !== 'Comum') partes.push(`(${tipodose})`);
    if (periodo) partes.push(periodo);
    if (pos) partes.push(pos);
    // "continuo" nao entra mais na posologia — aparece ao lado do nome no PDF

    const qtdNum = parseFloat(qtd) || parseFloat(qtddose) || 0;

    return {
      tipo:     (document.getElementById('di_' + n)?.dataset?.tipo) || 'simples',
      nome:     nome + (conc ? ' ' + conc : ''),
      forma:    pluralizeForma(forma, qtdNum),
      qtd:      qtd || (qtddose && unidade ? `${qtddose} ${pluralize(unidade, qtddose)}` : qtddose),
      pos:      partes.join(' | '),
      inicio,
      dur:      dur,
      obs,
      continuo: !!document.getElementById(`d${n}_continuo`)?.checked,
    };
  }).filter(d => d.nome);
}

/* ── Date helpers ── */
function fmtShort(iso) {
  if (!iso) return '';
  const [y, m, d] = iso.split('-');
  return `${d}/${m}/${y}`;
}
function fmtLong(iso) {
  if (!iso) return '';
  const [y, m, d] = iso.split('-');
  const meses = ['janeiro','fevereiro','março','abril','maio','junho',
                 'julho','agosto','setembro','outubro','novembro','dezembro'];
  return `${parseInt(d)} de ${meses[parseInt(m)-1]} de ${y}`;
}

/* ══════════════════════════════════════════
   PDF GENERATION
══════════════════════════════════════════ */
function generatePDF(mode = 'save') {
  if (!v('p_nome'))   { alert('Informe o nome do paciente.'); return; }
  if (!v('e_nome'))   { alert('Informe o nome do profissional.'); return; }
  if (!v('sig_data')) { alert('Informe a data da prescrição.'); return; }
  const drugList = getDrugs();
  if (!drugList.length) { alert('Adicione pelo menos um medicamento.'); return; }

  // Agrupar medicamentos por tipo mantendo a ordem de inserção
  const grupos = [];
  let grupoAtual = null;
  for (const dr of drugList) {
    if (!grupoAtual || grupoAtual.tipo !== dr.tipo) {
      grupoAtual = { tipo: dr.tipo, drugs: [] };
      grupos.push(grupoAtual);
    }
    grupoAtual.drugs.push(dr);
  }

  // Gerar um PDF por grupo de tipo
  grupos.forEach((grupo, gi) => {
    const d = {
      tipo:       grupo.tipo,
      u_estado:   v('u_estado'),
      u_municipio: v('u_municipio'),
      u_unidade:  v('u_unidade'),
      e_nome:     v('e_nome'),
      e_cpf:      v('e_cpf'),
      e_telefone: v('e_telefone'),
      e_conselho: v('e_conselho'),
      e_end:      v('e_end'),
      e_cargo:    v('e_cargo'),
      p_nome:     v('p_nome'),
      p_doc:      v('p_doc'),
      p_nasc:     v('p_nasc'),
      p_end:      v('p_end'),
      sig_cidade: v('sig_cidade'),
      sig_data:   v('sig_data'),
      drugs:      grupo.drugs,
    };

  const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
  const PW = 297, PH = 210, half = PW / 2;

  /* truncate text to fit max width */
  function fit(text, maxW, fs, font = 'helvetica', style = 'normal') {
    if (!text) return '';
    doc.setFont(font, style);
    doc.setFontSize(fs);
    let t = text;
    while (doc.getTextWidth(t) > maxW && t.length > 1) t = t.slice(0, -1);
    return t.length < text.length ? t.trimEnd() + '…' : t;
  }

  function drawVia(ox, viaIdx, pgAtual, pgTotal) {
    const lm = ox + 7, cw = half - 14, rm = lm + cw;

    /* ════════════════════════════════════════════════════
       ESPAÇAMENTOS — edite aqui para ajustar o layout
       Todas as medidas em milímetros (mm)
    ════════════════════════════════════════════════════ */
    const SP = {
      // ── Margem superior da página ──
      topoY:            5,     // y inicial (distância do topo da página)

      // ── Cabeçalho (logo + linha separadora) ──
      logoW:            30,    // largura do logo
      logoAposLinha:    2,     // espaço após a linha que separa o cabeçalho

      // ── Título (RECEITUÁRIO SIMPLES / CONTROLE ESPECIAL) ──
      tituloApos:       14,    // espaço que y avança após o bloco do título

      // ── Section labels (EMITENTE, CIDADÃO, MEDICAMENTOS…) ──
      sectionAposLabel: 1.5,   // espaço entre o texto do label e a linha
      sectionAposLinha: 4.5,   // espaço após a linha da section

      // ── Emitente ──
      emitenteLinha:    4,     // espaço entre cada linha do emitente
      emitenteApos:     2,     // espaço extra após o bloco do emitente

      // ── Cidadão ──
      cidadaoLinha:     4,     // espaço entre cada linha do cidadão
      cidadaoApos:      2,   // espaço extra após o bloco do cidadão

      // ── Medicamentos: box do nome (cabeçalho do card) ──
      nomeLinhaPasso:   4.3,   // altura de cada linha do nome (↓ = mais compacto)
      nomeY:            3.8,   // posição y do texto dentro do cabeçalho (baseline 1ª linha)
      headerMinH:       9,     // altura mínima do cabeçalho quando nome tem 1 linha
      headerPadding:    1.5,     // padding extra acima/abaixo do nome no cabeçalho

      // ── Medicamentos: corpo do card (posologia) ──
      posologiaInicioY: 3.8,     // distância do divisor até a 1ª linha da posologia
      posologiaLinha:   4,     // espaço entre linhas da posologia
      cardPaddingInf:   1.5,     // padding inferior do card (evita texto colado na borda)

      // ── Espaço entre cards de medicamentos ──
      entreCards:       1.2,

      // ── Espaço após o bloco de medicamentos ──
      aposSection:      4,
    };
    /* ════════════════════════════════════════════════════ */

    let y = SP.topoY;

    /* ── HEADER ── */
    const logoH = SP.logoW * 104 / 259; // proporcional 259x104
    doc.addImage(LOGO_B64, 'JPEG', lm, y, SP.logoW, logoH);

    const tx = lm + SP.logoW + 4;
    doc.setTextColor(0);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(8);
    doc.text(`MUNICIPIO DE ${d.u_municipio}`, tx, y + 5);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(7);
    doc.text(`UNIDADE DE SAUDE: ${fit(d.u_unidade, cw - SP.logoW - 8, 7)}`, tx, y + 11);

    doc.setDrawColor(0);
    doc.setLineWidth(0.3);
    doc.line(lm, y + logoH + 1, rm, y + logoH + 1);
    y += logoH + SP.logoAposLinha;

    /* ── TITLE ── */
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(10);
    doc.text(typeTitles[d.tipo], lm, y + 4);
    doc.setFontSize(6);
    doc.text(viaLabels[d.tipo][viaIdx], rm, y + 4, { align: 'right' });
    doc.line(lm, y + 6.5, rm, y + 6.5);
    y += SP.tituloApos;

    /* ── Section helper ── */
    function section(label) {
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(9);
      doc.setTextColor(0);
      doc.text(label, lm, y);
      y += SP.sectionAposLabel;
      doc.setDrawColor(160);
      doc.setLineWidth(0.2);
      doc.line(lm, y, rm, y);
      y += SP.sectionAposLinha;
    }

    /* ── EMITENTE ── */
    section('EMITENTE');
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(10.5);
    const emLine = `${d.e_nome}${d.e_conselho ? ' (' + d.e_conselho + ')' : ''}`;
    doc.text(fit(emLine, cw - 4, 10.5), lm + 3, y);
    if (d.e_cpf) { doc.text(`CPF: ${d.e_cpf}`, rm, y, { align: 'right' }); }
    y += SP.emitenteLinha;
    if (d.e_end) {
      doc.text(fit(d.e_end, cw - 4, 10.5), lm + 3, y);
      if (d.e_telefone) { doc.text(`Tel.: ${d.e_telefone}`, rm, y, { align: 'right' }); }
      y += SP.emitenteLinha;
    }
    y += SP.emitenteApos;

    /* ── CIDADÃO ── */
    section('CIDADÃO');
    doc.setFontSize(10.5);
    const cidNasc = d.p_nasc ? ` — Nasc.: ${fmtShort(d.p_nasc)}` : '';
    const cidLine = `${d.p_nome.toUpperCase()}${d.p_doc ? ' - ' + d.p_doc : ''}${cidNasc}`;
    doc.text(fit(cidLine, cw - 4, 10.5), lm + 3, y); y += SP.cidadaoLinha;
    if (d.p_end) { doc.text(fit(d.p_end, cw - 4, 10.5), lm + 3, y); y += SP.cidadaoLinha; }
    y += SP.cidadaoApos;

    /* ── MEDICAMENTOS ── */
    section('MEDICAMENTOS');
    y -= 2;
    d.drugs.forEach((dr, i) => {
      // ── Calcular linhas do nome com "— uso contínuo" inline no final ──
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(9.0);
      const continuoTag  = ' — uso contínuo';
      const continuoW    = dr.continuo ? (() => {
        doc.setFont('helvetica', 'bolditalic'); doc.setFontSize(8.0);
        const w = doc.getTextWidth(continuoTag);
        doc.setFont('helvetica', 'bold'); doc.setFontSize(9.0);
        return w;
      })() : 0;

      const nomeMaxW = cw * 0.63; // largura da coluna do nome menos padding
      const nomeTexto = `${i+1}. ${dr.nome}`;
      const nomeLines = doc.splitTextToSize(nomeTexto, nomeMaxW);

      const ultimaLinhaW = doc.getTextWidth(nomeLines[nomeLines.length - 1]);
      const continuoNaLinhaFinal = dr.continuo && (ultimaLinhaW + continuoW + 1) <= nomeMaxW;
      const continuoLinhaExtra   = dr.continuo && !continuoNaLinhaFinal;

      const nomeLinhas = nomeLines.length + (continuoLinhaExtra ? 1 : 0);
      const nomeH   = nomeLinhas * SP.nomeLinhaPasso;
      const headerH = Math.max(SP.headerMinH, nomeH + SP.headerPadding);

      const posLines = dr.pos ? doc.splitTextToSize(dr.pos, cw - 8) : [];
      let info = '';
      if (dr.inicio) info = `A partir de ${fmtShort(dr.inicio)}`;
      if (dr.dur)    info += (info ? ' durante ' : '') + dr.dur;
      const boxH = headerH + posLines.length * SP.posologiaLinha + (info ? SP.posologiaLinha : 0) + SP.cardPaddingInf;

      doc.setDrawColor(180);
      doc.setLineWidth(0.2);
      doc.rect(lm, y, cw, boxH);
      doc.line(lm, y + headerH, rm, y + headerH);

      // ── Nome: centralizado verticalmente no headerH ──
      const nomeHTotal = nomeLinhas * SP.nomeLinhaPasso;
      const nomeYStart = y + (headerH - nomeHTotal) / 2 + SP.nomeLinhaPasso * 0.75;

      doc.setFont('helvetica', 'bold');
      doc.setFontSize(9.0);
      doc.setTextColor(0);
      nomeLines.forEach((linha, li) => {
        doc.text(linha, lm + 2, nomeYStart + li * SP.nomeLinhaPasso);
        if (dr.continuo && li === nomeLines.length - 1 && continuoNaLinhaFinal) {
          const xApos = lm + 2 + doc.getTextWidth(linha) + 1;
          doc.setFont('helvetica', 'bolditalic');
          doc.setFontSize(8.0);
          doc.setTextColor(80);
          doc.text(continuoTag, xApos, nomeYStart + li * SP.nomeLinhaPasso);
          doc.setFont('helvetica', 'bold');
          doc.setFontSize(9.0);
          doc.setTextColor(0);
        }
      });
      if (continuoLinhaExtra) {
        doc.setFont('helvetica', 'bolditalic');
        doc.setFontSize(8.0);
        doc.setTextColor(80);
        doc.text(continuoTag, lm + 5, nomeYStart + nomeLines.length * SP.nomeLinhaPasso);
        doc.setTextColor(0);
      }

      // ── Qtd + Forma: alinhados à direita, centralizados verticalmente no headerH ──
      const midH = y + headerH / 2;
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(9);
      if (dr.qtd)  { doc.text(dr.qtd,   rm - 2, midH - 1.5, { align: 'right' }); }
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(8);
      if (dr.forma){ doc.text(dr.forma,  rm - 2, midH + 2.5, { align: 'right' }); }

      // posologia
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(9.5);
      let ty = y + headerH + SP.posologiaInicioY;
      posLines.forEach(l => { doc.text(l, lm + 3, ty); ty += SP.posologiaLinha; });
      if (info) { doc.setTextColor(60); doc.text(info, lm + 3, ty); doc.setTextColor(0); }

      y += boxH + SP.entreCards;
    });

    y += SP.aposSection;

    /* ── PROTOCOLOS DE REFERÊNCIA ── */
    const sanitize = s => s
      .replace(/[\u2013\u2014]/g, '-')
      .replace(/[\u2018\u2019]/g, "'")
      .replace(/[\u201C\u201D]/g, '"')
      .replace(/\u2265/g, '>= ')
      .replace(/\u2264/g, '<= ')
      .replace(/[^\x00-\xFF]/g, '?');

    const protocolosList = [...new Set(d.drugs.map(dr => dr.obs).filter(Boolean))];
    if (protocolosList.length) {
      section('PROTOCOLOS DE REFERÊNCIA (MS)');
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(9);
      doc.setTextColor(40);
      protocolosList.forEach((prot, idx) => {
        const prefix = `${idx + 1}. `;
        const clean = sanitize(prefix + prot);
        const lines = doc.splitTextToSize(clean, cw - 10);
        lines.forEach((l, li) => {
          doc.text(l, li === 0 ? lm + 3 : lm + 7, y);
          y += 3;
        });
        y += 1;
      });
      doc.setTextColor(0);
      y += 2;
    }

    /* ── ASSINATURA ── */
    const sigDate = fmtLong(d.sig_data);
    const sigLine = `${d.sig_cidade}${sigDate ? ', ' + sigDate : ''}`;
    const cx = lm + cw / 2;

    // Assinatura centralizada (sem carimbo)
    const sigLineW = cw * 0.55;
    const sigStartX = lm + (cw - sigLineW) / 2;
    const sigEndX   = sigStartX + sigLineW;
    const boxH = 22;

    doc.setDrawColor(0);
    doc.setLineWidth(0.3);
    doc.line(sigStartX, y + boxH - 11, sigEndX, y + boxH - 11);

    doc.setFont('helvetica', 'bold');
    doc.setFontSize(7);
    doc.setTextColor(0);
    doc.text(fit(d.e_nome, sigLineW, 7, 'helvetica', 'bold'), cx, y + boxH - 8.5, { align: 'center' });

    doc.setFont('helvetica', 'normal');
    doc.setFontSize(6.5);
    if (d.e_conselho) {
      doc.text(fit(d.e_conselho, sigLineW, 6.5), cx, y + boxH - 6, { align: 'center' });
    }
    if (d.e_cargo) {
      doc.text(fit(d.e_cargo, sigLineW, 6.5), cx, y + boxH - 3.5, { align: 'center' });
    }

    // Date below both boxes
    y += boxH + 0.5;
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(6.5);
    doc.setTextColor(60);
    doc.text(fit(sigLine, cw, 8), cx, y, { align: 'center' });
    doc.setTextColor(0);

    /* ── COMPRADOR / FORNECEDOR — somente Controle Especial (antibiotico) ── */
    if (d.tipo === 'antibiotico') {
      const compY = PH - 49;
      const compH = 26;
      doc.setFillColor(240, 240, 240);
      doc.setDrawColor(0);
      doc.setLineWidth(0.25);
      doc.rect(lm, compY, cw, compH);
      doc.rect(lm, compY, cw, 5.5, 'F');
      doc.setFont('helvetica', 'bold'); doc.setFontSize(6.5); doc.setTextColor(0);
      doc.text('IDENTIFICACAO DO COMPRADOR', cx, compY + 3.8, { align: 'center' });

      const cb = compY + 7;
      function ufield(lbl, x1, x2, yy) {
        doc.setFont('helvetica', 'bold'); doc.setFontSize(6.5);
        const lw = doc.getTextWidth(lbl);
        doc.text(lbl, x1, yy);
        doc.setDrawColor(100); doc.setLineWidth(0.2);
        doc.line(x1 + lw + 1, yy, x2, yy);
      }
      ufield('Nome:',         lm + 2, rm - 2,          cb + 3);
      ufield('Ident.:',       lm + 2, lm + cw * .48,   cb + 8);
      ufield('Org. emissor:', lm + cw * .5, rm - 2,    cb + 8);
      ufield('End.:',         lm + 2, rm - 2,          cb + 13);
      ufield('Cidade:',       lm + 2, lm + cw * .52,   cb + 18);
      ufield('UF:',           lm + cw * .54, lm + cw * .67, cb + 18);
      ufield('Telefone:',     lm + cw * .69, rm - 2,   cb + 18);

      const fornY = compY + compH + 1.5;
      const fornH = 14;
      doc.setDrawColor(0); doc.setLineWidth(0.25);
      doc.rect(lm, fornY, cw, fornH);
      doc.setFillColor(240, 240, 240);
      doc.rect(lm, fornY, cw, 5.5, 'F');
      doc.rect(lm, fornY, cw, 5.5);
      doc.setFont('helvetica', 'bold'); doc.setFontSize(6.5); doc.setTextColor(0);
      doc.text('IDENTIFICACAO DO FORNECEDOR', cx, fornY + 3.8, { align: 'center' });

      const fb = fornY + 9;
      doc.setDrawColor(0); doc.setLineWidth(0.25);
      // Linha de assinatura
      doc.line(lm + 4, fb + 2, lm + cw * .44, fb + 2);
      doc.setFont('helvetica', 'normal'); doc.setFontSize(6);
      doc.text('Assinatura do farmaceutico', lm + cw * .23, fb + 4.5, { align: 'center' });
      // Data de fornecimento — traços alinhados com o label
      const dx = lm + cw * .68;
      doc.line(dx,      fb + 2, dx + 8,  fb + 2);
      doc.text('/', dx + 9,  fb + 2);
      doc.line(dx + 10, fb + 2, dx + 18, fb + 2);
      doc.text('/', dx + 19, fb + 2);
      doc.line(dx + 20, fb + 2, dx + 30, fb + 2);
      doc.text('Data de fornecimento', dx + 15, fb + 4.5, { align: 'center' });
    }

    /* footer */
    const nowStr = new Date().toLocaleString('pt-BR');
    doc.setFont('helvetica', 'normal'); doc.setFontSize(5); doc.setTextColor(120);
    doc.text(`Impresso em ${nowStr} por ${d.e_nome}.`, lm, PH - 2);
    const paginaStr = (pgTotal > 1) ? `Receita ${pgAtual} / ${pgTotal}` : '1 / 1';
    doc.text(paginaStr, rm, PH - 2, { align: 'right' });
    doc.setTextColor(0);
  }

  /* ---- helper: divisor tracejado ---- */
  function drawDivider() {
    doc.setDrawColor(140);
    doc.setLineDashPattern([1.5, 1.5], 0);
    doc.line(half, 2, half, PH - 2);
    doc.setLineDashPattern([], 0);
  }

  /* ---- helper: calcular numero de linhas do nome de um medicamento ---- */
  function calcNomeLines(dr) {
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(9.0);
    const nomeMaxW = (half - 14) * 0.63;
    return doc.splitTextToSize(`1. ${dr.nome}`, nomeMaxW).length;
  }

  /* ---- paginacao dinamica para antibiotico ---- */
  const allDrugs = d.drugs;

  let lotes = [];
  if (d.tipo !== 'antibiotico') {
    // simples: tudo em uma pagina
    lotes = [allDrugs];
  } else {
    // antibiotico: max 2 por receita, mas nome longo (>1 linha) = sozinho
    let lote = [];
    for (const dr of allDrugs) {
      const linhas = calcNomeLines(dr);
      const nomeQuebraTexto = linhas > 1;
      if (nomeQuebraTexto) {
        // flush lote atual se tiver algo
        if (lote.length) { lotes.push(lote); lote = []; }
        // este medicamento fica sozinho
        lotes.push([dr]);
      } else {
        lote.push(dr);
        if (lote.length === 2) { lotes.push(lote); lote = []; }
      }
    }
    if (lote.length) lotes.push(lote);
  }

  const totalPaginas = lotes.length || 1;

  for (let pgIdx = 0; pgIdx < totalPaginas; pgIdx++) {
    if (pgIdx > 0) doc.addPage();
    d.drugs = lotes[pgIdx] || [];
    drawDivider();
    drawVia(0, 0, pgIdx + 1, totalPaginas);
    drawVia(half, 1, pgIdx + 1, totalPaginas);
  }

  d.drugs = allDrugs;

  const tipoSufixo = grupo.tipo === 'antibiotico' ? '_antibiotico' : '_simples';
  const grupoSufixo = grupos.length > 1 ? `_${gi + 1}` : '';
  const fname = `receita_${(d.p_nome||'paciente').split(' ')[0].toLowerCase()}${tipoSufixo}${grupoSufixo}_${d.sig_data}.pdf`;
  if (mode === 'print') {
    doc.autoPrint();
    const blobUrl = doc.output('bloburl');
    const win = window.open(blobUrl, '_blank');
    if (!win) alert('Permita pop-ups neste site para abrir a janela de impressão.');
  } else {
    doc.save(fname);
  }
  }); // fim forEach grupos
}

/* ── Protocol dropdown logic ── */
function renderProtocolGroups(list) {
  const container = document.getElementById('protocolGroups');
  if (!list.length) {
    container.innerHTML = '<div style="padding:16px;text-align:center;color:#999;font-size:15.6px;">Nenhum resultado encontrado</div>';
    return;
  }
  const byGroup = {};
  list.forEach(p => {
    if (!byGroup[p.group]) byGroup[p.group] = [];
    byGroup[p.group].push(p);
  });
  container.innerHTML = Object.entries(byGroup).map(([g, items]) => `
    <div>
      <div class="protocol-group-title">${g}</div>
      ${items.map(p => `
        <div class="protocol-item" data-protocol="${JSON.stringify(p).replace(/"/g,'&quot;')}">
          <div>
            <div class="protocol-item-name">${p.nome}</div>
            <div class="protocol-item-detail">${p.conc} · ${p.forma} · ${p.uso}</div>
          </div>
          <div class="protocol-item-badge">Ver</div>
        </div>
      `).join('')}
    </div>
  `).join('');
}

function toggleProtocolDropdown() {
  const btn = document.getElementById('protocolToggle');
  const dd  = document.getElementById('protocolDropdown');
  const open = dd.classList.toggle('open');
  btn.classList.toggle('open', open);
  if (open) {
    renderProtocolGroups(PROTOCOLS);
    // Rolar para que o botão fique no topo da viewport, mostrando o dropdown abaixo
    setTimeout(() => {
      btn.scrollIntoView({ behavior: 'smooth', block: 'start' });
      document.getElementById('protocolSearch').focus();
    }, 80);
  }
}

function filterProtocols() {
  const q = document.getElementById('protocolSearch').value.toLowerCase();
  const filtered = q
    ? PROTOCOLS.filter(p =>
        p.nome.toLowerCase().includes(q) ||
        p.uso.toLowerCase().includes(q) ||
        p.protocolo.toLowerCase().includes(q) ||
        p.group.toLowerCase().includes(q)
      )
    : PROTOCOLS;
  renderProtocolGroups(filtered);
}

function selectProtocol(p) {
  // Fechar dropdown
  document.getElementById('protocolDropdown').classList.remove('open');
  document.getElementById('protocolToggle').classList.remove('open');
  document.getElementById('protocolSearch').value = '';

  // Verificar se já existe uma prescrição em branco (nome vazio) para reutilizar
  let n = null;
  for (const id of drugs) {
    const nomeEl = document.getElementById(`d${id}_nome`);
    if (nomeEl && nomeEl.value.trim() === '') {
      n = id;
      break;
    }
  }

  // Se não encontrou prescrição vazia, cria uma nova
  if (n === null) {
    addDrug();
    n = drugCount;
  }

  // Preencher campos
  const setVal = (id, val) => { const el = document.getElementById(id); if (el) el.value = val; };
  setVal(`d${n}_nome`, p.nome);
  setVal(`d${n}_conc`, p.conc);
  updateDrugPreview(n);

  // Via de administração
  const viaEl = document.getElementById(`d${n}_via`);
  if (viaEl) {
    const opt = Array.from(viaEl.options).find(o => o.value === p.via || o.text.toLowerCase() === p.via.toLowerCase());
    if (opt) viaEl.value = opt.value;
  }

  // Forma farmacêutica
  const formaEl = document.getElementById(`d${n}_forma`);
  if (formaEl) {
    const formaSimple = p.forma.split(/[,/]/)[0].trim();
    const opt = Array.from(formaEl.options).find(o =>
      o.value.toLowerCase() === formaSimple.toLowerCase() ||
      o.value.toLowerCase().includes(formaSimple.toLowerCase())
    );
    if (opt) formaEl.value = opt.value;
  }

  // Posologia hint from uso
  setVal(`d${n}_pos`, p.uso);

  // Protocolo in obs
  setVal(`d${n}_obs`, p.protocolo);

  // Scroll e destaque
  const el = document.getElementById(`di_${n}`);
  if (el) {
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    el.style.transition = 'box-shadow .3s';
    el.style.boxShadow = '0 0 0 3px rgba(46,139,87,.4)';
    setTimeout(() => { el.style.boxShadow = ''; }, 1800);
  }
}

/* ── Auto preenchimento + detecção de troca de paciente em tempo real ── */
(function autoPreencherPaciente() {

  var _ultimoTs = 0;
  var _styleAdicionado = false;

  function garantirStyle() {
    if (_styleAdicionado) return;
    _styleAdicionado = true;
    var style = document.createElement('style');
    style.textContent = '@keyframes esusIn2{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}';
    document.head.appendChild(style);
  }

  function preencherCampos(dados) {
    if (!dados) return;
    console.log('[Receituário] Preenchendo campos com:', dados);

    ['p_nome','p_doc','p_end'].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.value = '';
    });
    var nascLimpar = document.getElementById('p_nasc');
    if (nascLimpar) nascLimpar.value = '';

    var nomeEl = document.getElementById('p_nome');
    if (nomeEl && dados.nome) {
      nomeEl.value = dados.nome.toUpperCase();
      nomeEl.dispatchEvent(new Event('input'));
    }

    var nascEl = document.getElementById('p_nasc');
    if (nascEl && dados.nascimento) {
      nascEl.value = dados.nascimento;
      nascEl.dispatchEvent(new Event('input'));
    }

    var docEl = document.getElementById('p_doc');
    if (docEl) {
      if (dados.cpf) {
        docEl.value = dados.cpf;
      } else if (dados.cns) {
        var digits = dados.cns.replace(/\D/g, '').slice(0, 15);
        docEl.value = digits.replace(/^(\d{3})(\d{0,4})(\d{0,4})(\d{0,4})/, function(_, a, b, c, d) {
          return [a, b, c, d].filter(Boolean).join(' ');
        });
      }
      if (docEl.value) docEl.dispatchEvent(new Event('input'));
    }

    garantirStyle();
    var bannerVelho = document.getElementById('esus-rec-banner');
    if (bannerVelho) bannerVelho.remove();
    var banner = document.createElement('div');
    banner.id = 'esus-rec-banner';
    banner.style.cssText = 'position:fixed;top:64px;right:18px;z-index:99999;background:#0f3460;color:#fff;border-radius:10px;padding:11px 16px;font-family:sans-serif;font-size:13px;box-shadow:0 4px 20px rgba(0,0,0,.3);max-width:300px;line-height:1.5;animation:esusIn2 .3s ease;cursor:pointer;';
    banner.innerHTML = '<b>✅ Paciente atualizado automaticamente</b><br><span style="opacity:.8;font-size:12px;">' + (dados.nome || '') + '</span>';
    banner.onclick = function() { banner.remove(); };
    document.body.appendChild(banner);
    setTimeout(function() { if (banner.parentNode) banner.remove(); }, 5000);
  }

  if (typeof chrome === 'undefined' || !chrome.storage || !chrome.storage.local) {
    console.log('[Receituário] chrome.storage indisponível.');
    return;
  }

  // Leitura inicial ao abrir o receituário
  chrome.storage.local.get('pacienteESUS', function(result) {
    var dados = result && result.pacienteESUS;
    if (dados && (dados.nome || dados.cpf || dados.cns)) {
      _ultimoTs = dados._ts || 0;
      preencherCampos(dados);
    }
  });

  // Escuta mudanças em tempo real — dispara imediatamente quando o content.js salva novo paciente
  chrome.storage.onChanged.addListener(function(changes, area) {
    if (area !== 'local' || !changes.pacienteESUS) return;
    var dados = changes.pacienteESUS.newValue;
    if (!dados || (!dados.nome && !dados.cpf && !dados.cns)) return;
    var ts = dados._ts || 0;
    if (ts !== _ultimoTs) {
      _ultimoTs = ts;
      preencherCampos(dados);
    }
  });

})();



/* ── MÁSCARAS DE INPUT ── */
function maskCPF(el) {
  let v = el.value.replace(/\D/g, '').slice(0, 11);
  if (v.length > 9)      v = v.replace(/^(\d{3})(\d{3})(\d{3})(\d{0,2})/, '$1.$2.$3-$4');
  else if (v.length > 6) v = v.replace(/^(\d{3})(\d{3})(\d{0,3})/,        '$1.$2.$3');
  else if (v.length > 3) v = v.replace(/^(\d{3})(\d{0,3})/,                '$1.$2');
  el.value = v;
}

function maskPhone(el) {
  let v = el.value.replace(/\D/g, '').slice(0, 11);
  if (v.length === 11)      v = v.replace(/^(\d{2})(\d{5})(\d{4})$/, '($1) $2-$3');
  else if (v.length === 10) v = v.replace(/^(\d{2})(\d{4})(\d{4})$/, '($1) $2-$3');
  else if (v.length > 6)    v = v.replace(/^(\d{2})(\d{4,5})(\d*)/, '($1) $2-$3');
  else if (v.length > 2)    v = v.replace(/^(\d{2})(\d*)/, '($1) $2');
  else if (v.length > 0)    v = v.replace(/^(\d*)/, '($1');
  el.value = v;
}

function maskCPFouCNS(el) {
  const digits = el.value.replace(/\D/g, '');
  if (digits.length <= 11) {
    // Formato CPF: 000.000.000-00
    let v = digits.slice(0, 11);
    if (v.length > 9)      v = v.replace(/^(\d{3})(\d{3})(\d{3})(\d{0,2})/, '$1.$2.$3-$4');
    else if (v.length > 6) v = v.replace(/^(\d{3})(\d{3})(\d{0,3})/,        '$1.$2.$3');
    else if (v.length > 3) v = v.replace(/^(\d{3})(\d{0,3})/,                '$1.$2');
    else v = digits;
    el.value = v;
  } else {
    // Formato CNS: 000 0000 0000 0000 (15 dígitos)
    let v = digits.slice(0, 15);
    v = v.replace(/^(\d{3})(\d{0,4})(\d{0,4})(\d{0,4})/, (_, a, b, c, d) =>
      [a, b, c, d].filter(Boolean).join(' '));
    el.value = v;
  }
}

/* ── Bind de eventos ── */
/* O script está no final do <body>, então o DOM já existe quando executa.
   NÃO usamos DOMContentLoaded pois em páginas de extensão (chrome-extension://)
   esse evento já disparou antes do script ser avaliado. */
(function bindEventos() {
  // Botões do topbar
  var btnPrint = document.getElementById('btn-print');
  if (btnPrint) btnPrint.addEventListener('click', printPDF);

  var btnGen = document.getElementById('btn-genpdf');
  if (btnGen) btnGen.addEventListener('click', generatePDF);

  // Unidade collapsible header
  var hdrUnidade = document.getElementById('hdr-unidade');
  if (hdrUnidade) hdrUnidade.addEventListener('click', function() { toggleCard('card_unidade'); });

  // Inputs de máscara
  var eCpf = document.getElementById('e_cpf_input') || document.getElementById('e_cpf');
  if (eCpf) eCpf.addEventListener('input', function() { maskCPF(this); });

  var eTel = document.querySelector('[data-mask="phone"]');
  if (eTel) eTel.addEventListener('input', function() { maskPhone(this); });

  var pDoc = document.querySelector('[data-mask="cpfcns"]') || document.getElementById('p_doc');
  if (pDoc) pDoc.addEventListener('input', function() { maskCPFouCNS(this); });

  // Busca de protocolo
  var psearch = document.getElementById('protocolSearch');
  if (psearch) psearch.addEventListener('input', filterProtocols);

  // Protocolo toggle
  var ptoggle = document.getElementById('protocolToggle');
  if (ptoggle) ptoggle.addEventListener('click', toggleProtocolDropdown);

  // Adicionar medicamento
  var btnAddDrug = document.getElementById('btn-add-drug');
  if (btnAddDrug) btnAddDrug.addEventListener('click', addDrug);

  // Carregar paciente manualmente do e-SUS
  var btnReloadPac = document.getElementById('btn-reload-pac');
  if (btnReloadPac) btnReloadPac.addEventListener('click', function() {
    if (typeof chrome === 'undefined' || !chrome.storage || !chrome.storage.local) {
      alert('chrome.storage indisponível. Abra esta página pela extensão.');
      return;
    }
    chrome.storage.local.get('pacienteESUS', function(result) {
      var dados = result && result.pacienteESUS;
      if (!dados || (!dados.nome && !dados.cpf && !dados.cns)) {
        alert('Nenhum paciente encontrado.\nAbra a página SOAP de um atendimento no e-SUS primeiro.');
        return;
      }
      // Força preenchimento mesmo que seja o mesmo paciente
      ['p_nome','p_doc','p_end'].forEach(function(id) {
        var el = document.getElementById(id); if (el) el.value = '';
      });
      var nascEl = document.getElementById('p_nasc'); if (nascEl) nascEl.value = '';

      var nomeEl = document.getElementById('p_nome');
      if (nomeEl && dados.nome) { nomeEl.value = dados.nome.toUpperCase(); nomeEl.dispatchEvent(new Event('input')); }

      var nasc2 = document.getElementById('p_nasc');
      if (nasc2 && dados.nascimento) { nasc2.value = dados.nascimento; nasc2.dispatchEvent(new Event('input')); }

      var docEl = document.getElementById('p_doc');
      if (docEl) {
        if (dados.cpf) {
          docEl.value = dados.cpf;
        } else if (dados.cns) {
          var digits = dados.cns.replace(/\D/g, '').slice(0, 15);
          docEl.value = digits.replace(/^(\d{3})(\d{0,4})(\d{0,4})(\d{0,4})/, function(_, a, b, c, d) {
            return [a, b, c, d].filter(Boolean).join(' ');
          });
        }
        if (docEl.value) docEl.dispatchEvent(new Event('input'));
      }

      // Feedback visual no botão
      btnReloadPac.textContent = '✅ Carregado!';
      btnReloadPac.style.borderColor = '#27ae60';
      btnReloadPac.style.color = '#27ae60';
      setTimeout(function() {
        btnReloadPac.textContent = '🔄 Carregar do e-SUS';
        btnReloadPac.style.borderColor = '#0f3460';
        btnReloadPac.style.color = '#0f3460';
      }, 2500);
    });
  });

  // Limpar paciente
  var btnClearPac = document.getElementById('btn-clear-pac');
  if (btnClearPac) btnClearPac.addEventListener('click', clearPaciente);

  var btnClearTudo = document.getElementById('btn-clear-tudo');
  if (btnClearTudo) btnClearTudo.addEventListener('click', clearTudo);
})();

/* ── Delegação de eventos para elementos dinâmicos (CSP-safe) ── */
document.addEventListener('click', function(e) {
  const t = e.target;
  const id = t.id || '';

  // drug-header toggle
  const drugHeader = t.closest('.drug-header');
  if (drugHeader) {
    const di = drugHeader.closest('.drug-item');
    if (di) {
      const n = di.id.replace('di_', '');
      // Se clicou em botão dentro do header, não faz toggle
      if (!t.closest('button') && !t.closest('label') && !t.closest('.drug-type-btns')) {
        toggleDrug(n);
        return;
      }
    }
  }

  // drug-type-btns: stopPropagation já não é necessário, mas garantimos
  if (t.closest('.drug-type-btns')) {
    e.stopPropagation && e.stopPropagation();
  }

  // Tipo simples/antibiotico
  if (t.classList.contains('drug-type-btn')) {
    const di = t.closest('.drug-item');
    if (di) {
      const n = di.id.replace('di_', '');
      const tipo = t.id.includes('antibiotico') ? 'antibiotico' : 'simples';
      setDrugTipo(n, tipo);
    }
    return;
  }

  // Limpar drug
  if (t.classList.contains('clear-btn') && t.title && t.title.includes('prescrição')) {
    e.stopPropagation();
    const di = t.closest('.drug-item');
    if (di) clearDrug(di.id.replace('di_', ''));
    return;
  }

  // Remover drug
  if (t.classList.contains('del-btn')) {
    e.stopPropagation();
    const di = t.closest('.drug-item');
    if (di) removeDrug(di.id.replace('di_', ''));
    return;
  }

  // Period tabs
  if (t.classList.contains('period-tab')) {
    const di = t.closest('.drug-item');
    if (di) {
      const n = di.id.replace('di_', '');
      const tipo = t.textContent.trim().toLowerCase().includes('inter') ? 'intervalo'
        : t.textContent.trim().toLowerCase().includes('freq') ? 'frequencia' : 'turno';
      setPeriodTab(n, tipo, t);
    }
    return;
  }

  // int-btn (intervalos)
  if (t.classList.contains('int-btn') && t.closest('#protocolGroups') === null) {
    const di = t.closest('.drug-item');
    if (di) {
      const n = di.id.replace('di_', '');
      const panel = t.closest('[id*="_panel_"]');
      if (panel && panel.id.includes('_panel_frequencia')) {
        const fqMap = {'1×':1,'2×':2,'3×':3,'4×':4};
        const fq = fqMap[t.textContent.trim()];
        if (fq) setFreqBtn(n, fq, t);
      } else {
        setIntBtn(n, t.textContent.trim(), t);
      }
    }
    return;
  }

  // Protocol item
  if (t.classList.contains('protocol-item') || t.closest('.protocol-item')) {
    const item = t.closest('.protocol-item');
    if (item && item.dataset.protocol) {
      try { selectProtocol(JSON.parse(item.dataset.protocol)); } catch(err) {}
    }
    return;
  }
});

// Delegação de input
document.addEventListener('input', function(e) {
  const t = e.target;
  const id = t.id || '';

  if (id.endsWith('_nome') || id.endsWith('_conc')) {
    const match = id.match(/^d(\d+)_/);
    if (match) updateDrugPreview(match[1]);
  }
  if (id.endsWith('_intcustom')) {
    const match = id.match(/^d(\d+)_/);
    if (match) setIntCustom(match[1], t);
  }
  if (id.endsWith('_freqcustom')) {
    const match = id.match(/^d(\d+)_/);
    if (match) setFreqCustom(match[1], t);
  }
  if (id.endsWith('_durnum')) {
    const match = id.match(/^d(\d+)_/);
    if (match) syncDurUnit(match[1]);
  }
});
